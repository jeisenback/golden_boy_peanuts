name: Backtests prototype

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'backtests/**'
      - 'tests/**'

jobs:
  run-backtests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest pydantic typing-extensions
      - name: Run backtests unit
        run: |
          pytest -q tests/test_backtest_gdelt_vol.py
