name: Runtime Import Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  runtime-import-check:
    name: Runtime Import Check (ESOD Architectural Rule)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # No pip install needed — scanner uses stdlib only (ast, pathlib, sys)
      # Enforces ESOD rule: no langchain.* or langgraph.* in src/
      - run: python .github/scripts/check_runtime_imports.py
