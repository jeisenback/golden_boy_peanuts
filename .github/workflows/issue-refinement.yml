name: Issue Refinement Agent (DoR Check)

on:
  issues:
    types: [labeled]

jobs:
  dor-check:
    name: Definition of Ready Check
    # Only run when the 'needs-review' label is applied
    if: github.event.label.name == 'needs-review'
    runs-on: ubuntu-latest
    permissions:
      issues: write    # needed to post comments and update labels

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install gh CLI
        run: |
          type gh || (
            sudo apt-get update -qq &&
            sudo apt-get install -y gh
          )

      - name: Run Issue Refinement Agent
        env:
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PYTHONPATH=. python scripts/run_issue_refinement.py \
            --issue ${{ github.event.issue.number }} \
            --post-comment \
            --update-labels
