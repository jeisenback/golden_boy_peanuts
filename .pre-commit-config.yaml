repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.3.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff
    rev: v0.18.4
    hooks:
      - id: ruff

  - repo: local
    hooks:
      - id: check-runtime-imports
        name: check-runtime-imports
        entry: python .github/scripts/check_runtime_imports.py
        language: system
        pass_filenames: false
        always_run: true
